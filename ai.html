<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0f14">
<title>TradePro AI Sniper</title>
<style>
:root{
  --bg:#0b0f14; --surface:#111722; --surface2:#0f1520; --border:#1f2937;
  --text:#eef2f7; --muted:#94a3b8; --gold:#d4af37; --green:#34d399; --red:#fb7185;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif}
.container{max-width:1180px;margin:0 auto;padding:18px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.brand{font-weight:800;font-size:22px}
.brand small{font-size:11px;color:var(--gold);margin-left:8px}
.btn{
  padding:11px 14px;border:none;border-radius:12px;cursor:pointer;font-weight:700
}
.btn-primary{background:var(--gold);color:#111}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.grid{display:grid;grid-template-columns:1.2fr .9fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:800}
.card-body{padding:16px}
.chart{width:100%;height:560px;border:0;background:#000}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
input,select{
  width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text)
}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.signal-card{background:linear-gradient(180deg,#141b28,#0f1520);border:1px solid var(--border);border-radius:20px;padding:18px}
.kicker{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.4px}
.decision{font-family:monospace;font-size:34px;font-weight:900;margin-top:8px}
.meta{margin-top:8px;color:var(--muted);font-size:14px}
.lines{display:grid;gap:10px;margin-top:16px}
.line{display:flex;justify-content:space-between;align-items:center;background:#0c1119;border:1px solid var(--border);border-radius:14px;padding:12px 14px}
.line span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.line b{font-family:monospace;font-size:18px}
.fold{margin-top:14px}
.fold button{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;font-weight:800;cursor:pointer
}
.fold-panel{display:none;margin-top:10px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px}
.fold-panel.open{display:block}
.fold-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.fold-item{background:#0c1119;border:1px solid var(--border);border-radius:12px;padding:12px}
.fold-item small{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.fold-item b{font-family:monospace;font-size:15px}
.log{white-space:pre-wrap;font-family:monospace;font-size:13px;line-height:1.7;color:var(--muted)}
.note{margin-top:10px;color:var(--muted);font-size:13px}
.good{color:var(--green)}
.bad{color:var(--red)}
@media (max-width: 900px){
  .grid,.form-grid,.fold-grid{grid-template-columns:1fr}
  .chart{height:360px}
  .decision{font-size:28px}
}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">TradePro <small>AI SNIPER</small></div>
    <button class="btn btn-secondary" onclick="window.location.href='index.html'">Back</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-header">Live Chart</div>
      <div class="card-body">
        <iframe id="chartFrame" class="chart" allowfullscreen></iframe>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-header">Setup</div>
        <div class="card-body">
          <div class="form-grid">
            <div>
              <label>API Key</label>
              <input id="apiKey" type="password" placeholder="Paste TwelveData API key">
            </div>
            <div>
              <label>Symbol</label>
              <select id="symbol">
                <option value="XAU/USD">XAU/USD</option>
                <option value="EUR/USD">EUR/USD</option>
                <option value="GBP/USD">GBP/USD</option>
                <option value="USD/JPY">USD/JPY</option>
              </select>
            </div>
            <div>
              <label>Chart Symbol</label>
              <select id="chartSymbol">
                <option value="OANDA:XAUUSD">OANDA:XAUUSD</option>
                <option value="OANDA:EURUSD">OANDA:EURUSD</option>
                <option value="OANDA:GBPUSD">OANDA:GBPUSD</option>
                <option value="OANDA:USDJPY">OANDA:USDJPY</option>
              </select>
            </div>
            <div>
              <label>Auto MTF Mode</label>
              <select id="autoMtfMode">
                <option value="scalp">Scalp (1H → 5m → 1m)</option>
                <option value="intraday">Intraday (4H → 15m → 1m)</option>
              </select>
            </div>
            <div>
              <label>Execution Timeframe</label>
              <select id="timeframe">
                <option value="5min">5min</option>
                <option value="15min">15min</option>
                <option value="1min">1min</option>
              </select>
            </div>
            <div>
              <label>Engine</label>
              <select id="mode">
                <option value="ultra">Ultra Sniper</option>
                <option value="balanced">Balanced Sniper</option>
              </select>
            </div>
          </div>
          <div class="actions">
            <button class="btn btn-primary" onclick="saveKey()">Save Key</button>
            <button class="btn btn-primary" onclick="runAnalysis()">Run Analysis</button>
          </div>
          <div class="note" id="note">Stage 1 clean build: stable chart + stable analysis + no duplicate IDs.</div>
        </div>
      </div>

      <div class="signal-card" style="margin-top:16px">
        <div class="kicker">Sniper Signal</div>
        <div class="decision" id="decision">WAIT</div>
        <div class="meta">
          Confidence: <span id="confidence">—</span> •
          Direction: <span id="direction">—</span> •
          Score: <span id="score">—</span>
        </div>

        <div class="lines">
          <div class="line"><span>Entry</span><b id="entry">—</b></div>
          <div class="line"><span>SL</span><b id="sl">—</b></div>
          <div class="line"><span>TP</span><b id="tp">—</b></div>
          <div class="line"><span>RR</span><b id="rr">—</b></div>
        </div>

        <div class="fold">
          <button onclick="toggleFold('contextPanel')">Show Context <span>▼</span></button>
          <div id="contextPanel" class="fold-panel">
            <div class="fold-grid">
              <div class="fold-item"><small>Daily Bias</small><b id="dailyBias">—</b></div>
              <div class="fold-item"><small>Weekly Bias</small><b id="weeklyBias">—</b></div>
              <div class="fold-item"><small>Narrative</small><b id="narrative">—</b></div>
              <div class="fold-item"><small>Liquidity Draw</small><b id="liquidityDraw">—</b></div>
            </div>
          </div>
        </div>

        <div class="fold">
          <button onclick="toggleFold('advancedPanel')">Advanced ICT <span>▼</span></button>
          <div id="advancedPanel" class="fold-panel">
            <div class="fold-grid">
              <div class="fold-item"><small>FVG</small><b id="fvgOut">—</b></div>
              <div class="fold-item"><small>PD Zone</small><b id="pdZone">—</b></div>
              <div class="fold-item"><small>MSS</small><b id="mssOut">—</b></div>
              <div class="fold-item"><small>Displacement</small><b id="dispOut">—</b></div>
            </div>
          </div>
        </div>

        <div class="fold">
          <button onclick="toggleFold('readPanel')">Market Read <span>▼</span></button>
          <div id="readPanel" class="fold-panel open">
            <div id="log" class="log">Waiting…</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const KEY = 'tradepro_api_key_clean_v1';

function $(id){ return document.getElementById(id); }

function toggleFold(id){
  $(id).classList.toggle('open');
}

function saveKey(){
  localStorage.setItem(KEY, $('apiKey').value.trim());
  $('note').textContent = 'API key saved.';
}

function loadKey(){
  $('apiKey').value = localStorage.getItem(KEY) || '';
}

function tfToTV(tf){
  if(tf === '1min') return '1';
  if(tf === '5min') return '5';
  if(tf === '15min') return '15';
  if(tf === '1h') return '60';
  if(tf === '4h') return '240';
  return '5';
}

function updateChart(){
  const sym = $('chartSymbol').value;
  const tf = tfToTV($('timeframe').value);
  $('chartFrame').src =
    'https://s.tradingview.com/widgetembed/?symbol=' + encodeURIComponent(sym) +
    '&interval=' + encodeURIComponent(tf) +
    '&theme=dark&style=1';
}

async function fetchCandles(interval, size=120){
  const key = $('apiKey').value.trim();
  if(!key) throw new Error('Paste TwelveData API key first');
  const symbol = $('symbol').value;
  const url =
    'https://api.twelvedata.com/time_series?symbol=' + encodeURIComponent(symbol) +
    '&interval=' + encodeURIComponent(interval) +
    '&outputsize=' + String(size) +
    '&apikey=' + encodeURIComponent(key);
  const res = await fetch(url);
  const data = await res.json();
  if(data.status === 'error') throw new Error(data.message || 'API error');
  const values = Array.isArray(data.values) ? data.values.slice().reverse() : [];
  return values.map(c => ({
    open: +c.open, high: +c.high, low: +c.low, close: +c.close, datetime: c.datetime
  }));
}

function fmt(v){
  return (v === null || v === undefined || Number.isNaN(v)) ? '—' : Number(v).toFixed(3);
}

function structure(c){
  const a = c.at(-1), b = c.at(-2);
  if(!a || !b) return 'RANGE';
  if(a.high > b.high && a.low > b.low) return 'BULLISH';
  if(a.high < b.high && a.low < b.low) return 'BEARISH';
  return 'RANGE';
}

function sweep(c){
  const a = c.at(-1);
  const look = c.slice(-16, -1);
  if(!a || look.length < 5) return { type:'NONE', level:null };
  const hi = Math.max(...look.map(x => x.high));
  const lo = Math.min(...look.map(x => x.low));
  if(a.high > hi && a.close < hi) return { type:'SWEEP HIGH', level:hi };
  if(a.low < lo && a.close > lo) return { type:'SWEEP LOW', level:lo };
  return { type:'NONE', level:null };
}

function detectTrueFVG(c){
  if(c.length < 3) return { type:'NONE', low:null, high:null, quality:'LOW' };
  const c1 = c.at(-3), c2 = c.at(-2), c3 = c.at(-1);
  if(c3.low > c1.high){
    const gap = c3.low - c1.high;
    const body = Math.abs(c2.close - c2.open) || 0.00001;
    const quality = gap > body * 0.35 ? 'HIGH' : gap > body * 0.18 ? 'MEDIUM' : 'LOW';
    return { type:'BULLISH FVG', low:c1.high, high:c3.low, quality };
  }
  if(c3.high < c1.low){
    const gap = c1.low - c3.high;
    const body = Math.abs(c2.close - c2.open) || 0.00001;
    const quality = gap > body * 0.35 ? 'HIGH' : gap > body * 0.18 ? 'MEDIUM' : 'LOW';
    return { type:'BEARISH FVG', low:c3.high, high:c1.low, quality };
  }
  return { type:'NONE', low:null, high:null, quality:'LOW' };
}

function premiumDiscountZones(c){
  const seg = c.slice(-50);
  const hi = Math.max(...seg.map(x => x.high));
  const lo = Math.min(...seg.map(x => x.low));
  const eq = (hi + lo) / 2;
  const q1 = lo + (hi - lo) * 0.25;
  const q3 = lo + (hi - lo) * 0.75;
  const price = c.at(-1).close;
  let zone = 'EQUILIBRIUM';
  if(price <= q1) zone = 'DEEP DISCOUNT';
  else if(price < eq) zone = 'DISCOUNT';
  else if(price >= q3) zone = 'DEEP PREMIUM';
  else if(price > eq) zone = 'PREMIUM';
  return { hi, lo, eq, price, zone };
}

function refinedMSS(c){
  if(c.length < 12) return { type:'NONE', level:null, strength:'LOW' };
  const last = c.at(-1);
  const prev = c.slice(-8, -1);
  const swingHigh = Math.max(...prev.map(x => x.high));
  const swingLow = Math.min(...prev.map(x => x.low));
  const body = Math.abs(last.close - last.open);
  const range = Math.max(Math.abs(last.high - last.low), 0.00001);
  const ratio = body / range;
  const strength = ratio > 0.7 ? 'HIGH' : ratio > 0.45 ? 'MEDIUM' : 'LOW';

  if(last.close > swingHigh) return { type:'BULLISH MSS', level:swingHigh, strength };
  if(last.close < swingLow) return { type:'BEARISH MSS', level:swingLow, strength };
  return { type:'NONE', level:null, strength:'LOW' };
}

function refinedDisplacement(c){
  if(c.length < 20) return { strong:false, strength:'LOW', body:0, avg:0 };
  const sample = c.slice(-20, -1).map(x => Math.abs(x.close - x.open));
  const avg = sample.reduce((a,b) => a+b, 0) / sample.length;
  const last = c.at(-1);
  const body = Math.abs(last.close - last.open);
  const full = Math.max(Math.abs(last.high - last.low), 0.00001);
  const ratio = body / full;
  const mult = avg > 0 ? body / avg : 0;
  let strength = 'LOW';
  if(mult >= 2.2 && ratio >= 0.72) strength = 'HIGH';
  else if(mult >= 1.6 && ratio >= 0.55) strength = 'MEDIUM';
  return { strong: strength !== 'LOW', strength, body, avg };
}

function detectLiquidityPools(c){
  if(c.length < 25) return { eqHigh:null, eqLow:null, extHigh:null, extLow:null };
  const recent = c.slice(-25);
  const extHigh = Math.max(...recent.map(x => x.high));
  const extLow = Math.min(...recent.map(x => x.low));
  const recent12 = c.slice(-12);
  const tol = Math.max(Math.abs((extHigh - extLow) * 0.03), 0.15);
  let eqHigh = null, eqLow = null;
  for(let i=0;i<recent12.length;i++){
    for(let j=i+1;j<recent12.length;j++){
      if(Math.abs(recent12[i].high - recent12[j].high) <= tol) eqHigh = (recent12[i].high + recent12[j].high) / 2;
      if(Math.abs(recent12[i].low - recent12[j].low) <= tol) eqLow = (recent12[i].low + recent12[j].low) / 2;
    }
  }
  return { eqHigh, eqLow, extHigh, extLow };
}

function liquidityDraw(price, liq){
  const cands = [];
  if(liq.eqHigh) cands.push({ name:'EQ HIGH', side:'UP', level:liq.eqHigh });
  if(liq.eqLow) cands.push({ name:'EQ LOW', side:'DOWN', level:liq.eqLow });
  if(liq.extHigh) cands.push({ name:'EXT HIGH', side:'UP', level:liq.extHigh });
  if(liq.extLow) cands.push({ name:'EXT LOW', side:'DOWN', level:liq.extLow });
  const above = cands.filter(x => x.level > price).sort((a,b)=>a.level-b.level)[0];
  const below = cands.filter(x => x.level < price).sort((a,b)=>b.level-a.level)[0];
  const distAbove = above ? Math.abs(above.level - price) : Infinity;
  const distBelow = below ? Math.abs(price - below.level) : Infinity;
  if(distAbove < distBelow) return above || { name:'NONE', side:'NONE', level:null };
  return below || { name:'NONE', side:'NONE', level:null };
}

function detectDailyBias(c){
  const seg = c.slice(-50);
  const hi = Math.max(...seg.map(x => x.high));
  const lo = Math.min(...seg.map(x => x.low));
  const eq = (hi + lo) / 2;
  const price = c.at(-1).close;
  if(price > eq) return { bias:'BULLISH' };
  if(price < eq) return { bias:'BEARISH' };
  return { bias:'NEUTRAL' };
}

function detectWeeklyBias(c){
  const seg = c.slice(-100);
  const hi = Math.max(...seg.map(x => x.high));
  const lo = Math.min(...seg.map(x => x.low));
  const eq = (hi + lo) / 2;
  const price = c.at(-1).close;
  if(price > eq) return { bias:'BULLISH' };
  if(price < eq) return { bias:'BEARISH' };
  return { bias:'RANGE' };
}

function liquidityNarrative(db, wb, draw, sw){
  let side = 'NEUTRAL';
  let text = 'BALANCED';
  if((db.bias === 'BULLISH' || wb.bias === 'BULLISH') && draw.side === 'UP'){
    side = 'BUY';
    text = 'BUY-SIDE DELIVERY';
  } else if((db.bias === 'BEARISH' || wb.bias === 'BEARISH') && draw.side === 'DOWN'){
    side = 'SELL';
    text = 'SELL-SIDE DELIVERY';
  }
  if(sw.type === 'SWEEP HIGH') text += ' • BUY-SIDE GRAB';
  if(sw.type === 'SWEEP LOW') text += ' • SELL-SIDE GRAB';
  return { side, text };
}

function preciseEntry(g, sw, direction, last){
  let entry = last.close, sl = null, tp = null;
  if(g.type !== 'NONE' && g.low !== null && g.high !== null){
    entry = (g.low + g.high) / 2;
  }
  if(direction === 'BUY'){
    sl = sw.level !== null ? Math.min(sw.level, last.low) : last.low;
    tp = entry + Math.abs(entry - sl) * 3;
  } else if(direction === 'SELL'){
    sl = sw.level !== null ? Math.max(sw.level, last.high) : last.high;
    tp = entry - Math.abs(entry - sl) * 3;
  }
  const rr = (sl !== null && tp !== null && entry !== null) ? Math.abs(tp - entry) / Math.abs(entry - sl) : null;
  return { entry, sl, tp, rr };
}

function build(execCandles){
  const s = structure(execCandles);
  const sw = sweep(execCandles);
  const g = detectTrueFVG(execCandles);
  const p = premiumDiscountZones(execCandles);
  const ms = refinedMSS(execCandles);
  const d = refinedDisplacement(execCandles);
  const db = detectDailyBias(execCandles);
  const wb = detectWeeklyBias(execCandles);
  const liq = detectLiquidityPools(execCandles);
  const draw = liquidityDraw(p.price, liq);
  const narr = liquidityNarrative(db, wb, draw, sw);

  let score = 0;
  const reasons = [];

  if(sw.type === 'SWEEP LOW'){ score += 2; reasons.push('sweep low'); }
  if(sw.type === 'SWEEP HIGH'){ score += 2; reasons.push('sweep high'); }
  if(ms.type === 'BULLISH MSS'){ score += 3; reasons.push('bullish MSS'); }
  if(ms.type === 'BEARISH MSS'){ score += 3; reasons.push('bearish MSS'); }
  if(ms.strength === 'HIGH'){ score += 1; reasons.push('high MSS strength'); }
  if(d.strong){ score += 2; reasons.push('strong displacement'); }
  if(d.strength === 'HIGH'){ score += 1; reasons.push('high displacement'); }
  if(g.type !== 'NONE'){ score += 2; reasons.push('valid FVG'); }
  if(g.quality === 'HIGH'){ score += 1; reasons.push('high quality FVG'); }
  if(p.zone === 'DEEP DISCOUNT' || p.zone === 'DEEP PREMIUM'){ score += 1; reasons.push('PD extreme'); }
  if(db.bias !== 'NEUTRAL'){ score += 1; reasons.push('daily bias ' + db.bias); }
  if(wb.bias !== 'RANGE'){ score += 1; reasons.push('weekly bias ' + wb.bias); }
  if(draw.name !== 'NONE'){ score += 1; reasons.push('liquidity draw ' + draw.name); }

  let decision = 'WAIT';
  let direction = 'WAIT';

  if((sw.type === 'SWEEP LOW' || narr.side === 'BUY') &&
     ms.type === 'BULLISH MSS' &&
     d.strong &&
     g.type === 'BULLISH FVG' &&
     (p.zone === 'DISCOUNT' || p.zone === 'DEEP DISCOUNT') &&
     (db.bias === 'BULLISH' || db.bias === 'NEUTRAL') &&
     (wb.bias === 'BULLISH' || wb.bias === 'RANGE')){
    decision = 'VALID SNIPER BUY';
    direction = 'BUY';
  } else if((sw.type === 'SWEEP HIGH' || narr.side === 'SELL') &&
     ms.type === 'BEARISH MSS' &&
     d.strong &&
     g.type === 'BEARISH FVG' &&
     (p.zone === 'PREMIUM' || p.zone === 'DEEP PREMIUM') &&
     (db.bias === 'BEARISH' || db.bias === 'NEUTRAL') &&
     (wb.bias === 'BEARISH' || wb.bias === 'RANGE')){
    decision = 'VALID SNIPER SELL';
    direction = 'SELL';
  } else if(s === 'BULLISH' && g.type === 'BULLISH FVG'){
    decision = 'WAIT FOR BUY';
    direction = 'BUY BIAS';
  } else if(s === 'BEARISH' && g.type === 'BEARISH FVG'){
    decision = 'WAIT FOR SELL';
    direction = 'SELL BIAS';
  }

  const confidence = Math.min(95, Math.max(5, Math.round((Math.min(score, 10) / 10) * 100)));
  const trade = preciseEntry(g, sw, direction.includes('BUY') ? 'BUY' : direction.includes('SELL') ? 'SELL' : null, execCandles.at(-1));

  return {
    decision,
    direction,
    confidence,
    score: Math.min(score, 10),
    entry: trade.entry,
    sl: trade.sl,
    tp: trade.tp,
    rr: trade.rr,
    db,
    wb,
    narr,
    ms,
    d,
    g,
    p,
    liq,
    draw,
    reasons
  };
}

async function runAnalysis(){
  try{
    updateChart();
    $('note').textContent = 'Running analysis...';

    const preset = $('autoMtfMode').value;
    let execTf = '5min';
    if(preset === 'intraday') execTf = '15min';
    $('timeframe').value = execTf;

    const candles = await fetchCandles(execTf, 120);
    if(candles.length < 20) throw new Error('Not enough candles');

    const r = build(candles);

    $('decision').textContent = r.decision;
    $('direction').textContent = r.direction;
    $('confidence').textContent = r.confidence + '%';
    $('score').textContent = r.score + '/10';
    $('entry').textContent = fmt(r.entry);
    $('sl').textContent = fmt(r.sl);
    $('tp').textContent = fmt(r.tp);
    $('rr').textContent = r.rr ? r.rr.toFixed(2) : '—';

    $('dailyBias').textContent = r.db.bias;
    $('weeklyBias').textContent = r.wb.bias;
    $('narrative').textContent = r.narr.text;
    $('liquidityDraw').textContent = r.draw.name !== 'NONE' ? `${r.draw.name} @ ${fmt(r.draw.level)}` : 'NONE';

    $('fvgOut').textContent = `${r.g.type} / ${r.g.quality}`;
    $('pdZone').textContent = r.p.zone;
    $('mssOut').textContent = `${r.ms.type} / ${r.ms.strength}`;
    $('dispOut').textContent = r.d.strength;

    $('log').textContent =
`Decision: ${r.decision}
Direction: ${r.direction}
Confidence: ${r.confidence}%
Score: ${r.score}/10

Daily Bias: ${r.db.bias}
Weekly Bias: ${r.wb.bias}
Narrative: ${r.narr.text}
Liquidity Draw: ${r.draw.name !== 'NONE' ? r.draw.name + ' @ ' + fmt(r.draw.level) : 'NONE'}

FVG: ${r.g.type} / ${r.g.quality}
PD Zone: ${r.p.zone}
MSS: ${r.ms.type} / ${r.ms.strength}
Displacement: ${r.d.strength}

Reasons:
- ${r.reasons.join('\n- ') || 'No strong confluence yet'}`;

    $('note').textContent = 'Analysis completed.';
  } catch(err){
    $('note').textContent = 'Error: ' + err.message;
    $('log').textContent = 'Error: ' + err.message;
  }
}

loadKey();
updateChart();
$('readPanel').classList.add('open');
$('chartSymbol').addEventListener('change', updateChart);
$('timeframe').addEventListener('change', updateChart);
</script>
</body>
</html>
