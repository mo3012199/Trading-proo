<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080a0e">
<title>TradePro AI</title>
<style>
:root{
  --bg:#080a0e; --surface:#0d1117; --surface2:#111720; --border:#1c2535; --border2:#243044;
  --gold:#c9a84c; --gold2:#e8c97a; --gold-dim:rgba(201,168,76,.12); --gold-glow:rgba(201,168,76,.25);
  --green:#3dd68c; --red:#f0566a; --blue:#4d9de0; --txt:#e8edf5; --txt2:#8a97b0; --txt3:#4a566a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080a0e;color:var(--txt);font-family:Inter,Arial,sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
.shell{max-width:1200px;margin:0 auto;padding:0 24px 100px;position:relative;z-index:1}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid var(--border)}
.logo{font-size:22px;letter-spacing:.5px;display:flex;align-items:center;gap:10px;font-weight:800}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#8a6a20);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 20px var(--gold-glow)}
.logo-ver{font-size:11px;color:var(--gold);font-family:monospace;background:var(--gold-dim);padding:2px 8px;border-radius:20px;border:1px solid rgba(201,168,76,.3)}
.icon-btn{height:40px;padding:0 14px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);color:var(--txt2);cursor:pointer}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
.main{padding:28px 0}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.section-hd h2{font-size:30px;font-weight:800}
.hd-sub{font-size:13px;color:var(--txt2);font-family:monospace}
.ai-grid{display:grid;grid-template-columns:1.3fr .9fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-hd{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:700}
.card-body{padding:16px}
.ai-chart{width:100%;height:560px;border:0;background:#000}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-family:monospace;font-size:14px;color:var(--txt);outline:none}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn{padding:12px 20px;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#0a0800;box-shadow:0 4px 16px var(--gold-glow)}
.btn-ghost{background:var(--surface2);color:var(--txt2);border:1px solid var(--border2)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.kpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px}
.kpi-card small{display:block;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.kpi-card b{font-family:monospace;font-size:24px}
.log{white-space:pre-wrap;font-family:monospace;font-size:13px;line-height:1.7;color:var(--txt2)}
.muted{color:var(--txt2)}
.pos{color:var(--green)} .neg{color:var(--red)} .blue{color:var(--blue)}
@media(max-width:900px){
  .ai-grid,.form-grid,.kpi-grid{grid-template-columns:1fr}
  .shell{padding:0 16px 90px}
  .ai-chart{height:360px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">⚡</div>
      <span>TradePro</span>
      <span class="logo-ver">AI</span>
    </div>
    <button class="icon-btn" onclick="window.location.href='index.html'">← Back</button>
  </div>

  <main class="main">
    <div class="section-hd">
      <div>
        <h2>AI Assistant</h2>
        <div class="hd-sub">Isolated from the main app so it cannot break your original pages</div>
      </div>
    </div>

    <div class="ai-grid">
      <div class="card">
        <div class="card-hd">Live Chart</div>
        <div class="card-body">
          <iframe id="aiChart" class="ai-chart" src="" allowfullscreen></iframe>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="card-hd">Setup</div>
          <div class="card-body">
            <div class="form-grid">
              <div>
                <label>API Key</label>
                <input id="apiKey" type="password" placeholder="Paste TwelveData API key">
              </div>
              <div>
                <label>Symbol</label>
                <select id="symbol">
                  <option value="XAU/USD">XAU/USD</option>
                  <option value="EUR/USD">EUR/USD</option>
                  <option value="GBP/USD">GBP/USD</option>
                  <option value="USD/JPY">USD/JPY</option>
                </select>
              </div>
              <div>
                <label>Chart Symbol</label>
                <select id="chartSymbol">
                  <option value="OANDA:XAUUSD">XAUUSD</option>
                  <option value="OANDA:EURUSD">EURUSD</option>
                  <option value="OANDA:GBPUSD">GBPUSD</option>
                  <option value="OANDA:USDJPY">USDJPY</option>
                </select>
              </div>
              <div>
                <label>Timeframe</label>
                <select id="timeframe">
                  <option value="1min">1min</option>
                  <option value="5min">5min</option>
                  <option value="15min">15min</option>
                </select>
              </div>
              <div>
                <label>Mode</label>
                <select id="mode">
                  <option value="sniper">Sniper</option>
                  <option value="balanced">Balanced</option>
                </select>
              </div>
            </div>

            <div class="btn-row">
              <button class="btn btn-gold" onclick="saveKey()">Save Key</button>
              <button class="btn btn-gold" onclick="runAnalysis(true)">Run Analysis</button>
              <button class="btn btn-ghost" onclick="startAuto()">Auto Refresh</button>
              <button class="btn btn-ghost" onclick="stopAuto()">Stop</button>
            </div>
            <div id="note" class="muted" style="margin-top:10px">AI is isolated on purpose.</div>

            <div class="kpi-grid">
              <div class="kpi-card"><small>Decision</small><b id="decision">—</b></div>
              <div class="kpi-card"><small>Direction</small><b id="direction">—</b></div>
              <div class="kpi-card"><small>Confidence</small><b id="confidence">—</b></div>
              <div class="kpi-card"><small>Score</small><b id="score">—</b></div>
            </div>

            <div class="kpi-grid">
              <div class="kpi-card"><small>Entry</small><b id="entry">—</b></div>
              <div class="kpi-card"><small>SL</small><b id="sl">—</b></div>
              <div class="kpi-card"><small>TP</small><b id="tp">—</b></div>
              <div class="kpi-card"><small>RR</small><b id="rr">—</b></div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:16px">
          <div class="card-hd">Market Read</div>
          <div class="card-body">
            <div id="log" class="log">Waiting…</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const KEY='tradepro_ai_isolated_key';
let loop=null;

function fmt(v){ return (v===null||v===undefined||Number.isNaN(v)) ? '—' : Number(v).toFixed(3); }
function tfMap(v){ return v==='1min' ? '1' : v==='5min' ? '5' : '15'; }

function updateChart(){
  const sym=document.getElementById('chartSymbol').value;
  const tf=tfMap(document.getElementById('timeframe').value);
  document.getElementById('aiChart').src='https://s.tradingview.com/widgetembed/?symbol='+encodeURIComponent(sym)+'&interval='+encodeURIComponent(tf)+'&theme=dark&style=1';
}
function saveKey(){
  localStorage.setItem(KEY, document.getElementById('apiKey').value.trim());
  document.getElementById('note').textContent='API key saved on this device.';
}
function loadKey(){
  document.getElementById('apiKey').value=localStorage.getItem(KEY)||'';
}
async function fetchCandles(){
  const key=document.getElementById('apiKey').value.trim();
  if(!key) throw new Error('Paste TwelveData API key first');
  const symbol=document.getElementById('symbol').value;
  const tf=document.getElementById('timeframe').value;
  const url='https://api.twelvedata.com/time_series?symbol='+encodeURIComponent(symbol)+'&interval='+encodeURIComponent(tf)+'&apikey='+encodeURIComponent(key)+'&outputsize=80';
  const res=await fetch(url);
  const data=await res.json();
  if(data.status==='error') throw new Error(data.message || 'API error');
  return data.values.slice().reverse().map(c=>({open:+c.open,high:+c.high,low:+c.low,close:+c.close}));
}
function structure(c){ const a=c.at(-1), b=c.at(-2); if(a.high>b.high&&a.low>b.low) return 'BULLISH'; if(a.high<b.high&&a.low<b.low) return 'BEARISH'; return 'RANGE'; }
function sweep(c){ const a=c.at(-1), look=c.slice(-12,-1), hi=Math.max(...look.map(x=>x.high)), lo=Math.min(...look.map(x=>x.low)); if(a.high>hi&&a.close<hi) return {type:'SWEEP HIGH',level:hi}; if(a.low<lo&&a.close>lo) return {type:'SWEEP LOW',level:lo}; return {type:'NONE',level:null}; }
function mss(c){ const a=c.at(-1), lows=c.slice(-8,-1).map(x=>x.low), highs=c.slice(-8,-1).map(x=>x.high), lo=Math.min(...lows), hi=Math.max(...highs); if(a.close<lo) return {type:'BEARISH MSS',level:lo}; if(a.close>hi) return {type:'BULLISH MSS',level:hi}; return {type:'NONE',level:null}; }
function displacement(c){ const bodies=c.slice(-15,-1).map(x=>Math.abs(x.close-x.open)), avg=bodies.reduce((s,v)=>s+v,0)/bodies.length, a=c.at(-1), body=Math.abs(a.close-a.open); return {strong:body>avg*1.8, body, avg}; }
function fvg(c){ const c1=c.at(-3), c3=c.at(-1); if(c3.low>c1.high) return {type:'BULLISH FVG',low:c1.high,high:c3.low}; if(c3.high<c1.low) return {type:'BEARISH FVG',low:c3.high,high:c1.low}; return {type:'NONE',low:null,high:null}; }
function pd(c){ const seg=c.slice(-30), hi=Math.max(...seg.map(x=>x.high)), lo=Math.min(...seg.map(x=>x.low)), mid=(hi+lo)/2, price=c.at(-1).close; return {zone:price>=mid?'PREMIUM':'DISCOUNT',mid,hi,lo}; }

function build(c){
  const s=structure(c), sw=sweep(c), ms=mss(c), d=displacement(c), g=fvg(c), p=pd(c), last=c.at(-1);
  let score=0, reasons=[];
  if(sw.type==='SWEEP LOW'){score+=2;reasons.push('✓ sweep low')}
  if(sw.type==='SWEEP HIGH'){score+=2;reasons.push('✓ sweep high')}
  if(ms.type==='BULLISH MSS'){score+=3;reasons.push('✓ bullish MSS')}
  if(ms.type==='BEARISH MSS'){score+=3;reasons.push('✓ bearish MSS')}
  if(d.strong){score+=2;reasons.push('✓ strong displacement')}
  if(g.type!=='NONE'){score+=2;reasons.push('✓ valid FVG')}
  if(p.zone==='DISCOUNT'&&(ms.type==='BULLISH MSS'||s==='BULLISH')){score+=1;reasons.push('✓ discount context')}
  if(p.zone==='PREMIUM'&&(ms.type==='BEARISH MSS'||s==='BEARISH')){score+=1;reasons.push('✓ premium context')}

  let decision='NO TRADE', direction='WAIT', entry=null, sl=null, tp=null;
  if(sw.type==='SWEEP LOW'&&ms.type==='BULLISH MSS'&&d.strong&&g.type==='BULLISH FVG'){direction='BUY'; entry=g.low??last.close; sl=Math.min(last.low, sw.level??last.low); tp=p.hi;}
  if(sw.type==='SWEEP HIGH'&&ms.type==='BEARISH MSS'&&d.strong&&g.type==='BEARISH FVG'){direction='SELL'; entry=g.high??last.close; sl=Math.max(last.high, sw.level??last.high); tp=p.lo;}
  const threshold=document.getElementById('mode').value==='sniper'?8:6;
  if(direction!=='WAIT'&&score>=threshold) decision=document.getElementById('mode').value==='sniper'?'SNIPER SETUP':'VALID SETUP';
  let rr=null; if(entry!==null&&sl!==null&&tp!==null){ const risk=Math.abs(entry-sl), reward=Math.abs(tp-entry); rr=risk>0?reward/risk:null; }
  return {decision,direction,confidence:Math.min(95,Math.max(5,Math.round(score/10*100))),score,entry,sl,tp,rr,s,sw,ms,d,g,p,reasons};
}

async function runAnalysis(force){
  try{
    updateChart();
    document.getElementById('log').textContent='Fetching candles and analyzing...';
    const candles=await fetchCandles();
    const r=build(candles);
    document.getElementById('decision').textContent=r.decision;
    document.getElementById('direction').textContent=r.direction;
    document.getElementById('confidence').textContent=r.confidence+'%';
    document.getElementById('score').textContent=r.score+'/10';
    document.getElementById('entry').textContent=fmt(r.entry);
    document.getElementById('sl').textContent=fmt(r.sl);
    document.getElementById('tp').textContent=fmt(r.tp);
    document.getElementById('rr').textContent=r.rr?r.rr.toFixed(2):'—';
    document.getElementById('log').textContent=
`Structure: ${r.s}
Sweep: ${r.sw.type}${r.sw.level?' @ '+fmt(r.sw.level):''}
MSS: ${r.ms.type}${r.ms.level?' @ '+fmt(r.ms.level):''}
Displacement: ${r.d.strong?'STRONG':'WEAK'} (body ${fmt(r.d.body)} vs avg ${fmt(r.d.avg)})
FVG: ${r.g.type}${r.g.low!==null?' ['+fmt(r.g.low)+' → '+fmt(r.g.high)+']':''}
PD Zone: ${r.p.zone} | Mid ${fmt(r.p.mid)} | Range ${fmt(r.p.lo)} → ${fmt(r.p.hi)}

Reasons:
${r.reasons.length?r.reasons.map(x=>'- '+x).join('\n'):'- no strong ICT alignment yet'}`;
  }catch(e){
    document.getElementById('log').textContent='Error: '+e.message;
  }
}
function startAuto(){ stopAuto(); runAnalysis(true); const tf=document.getElementById('timeframe').value==='1min'?60000:document.getElementById('timeframe').value==='5min'?180000:300000; loop=setInterval(()=>runAnalysis(false),tf); document.getElementById('note').textContent='Auto refresh ON.'; }
function stopAuto(){ if(loop){ clearInterval(loop); loop=null; } document.getElementById('note').textContent='Auto refresh OFF.'; }

document.getElementById('timeframe').addEventListener('change', updateChart);
document.getElementById('chartSymbol').addEventListener('change', updateChart);
loadKey(); updateChart();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
</script>
</body>
</html>
